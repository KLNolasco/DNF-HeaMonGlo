<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DNF Glove">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logo.jpg">
<title>DNF Glove</title>
<style>
  :root {
    --bg:       #0a0f1e;
    --surface:  #111827;
    --surface2: #1a2236;
    --border:   rgba(110,180,255,0.12);
    --accent:   #38bdf8;
    --accent2:  #0ea5e9;
    --red:      #f87171;
    --blue:     #60a5fa;
    --green:    #34d399;
    --amber:    #fbbf24;
    --muted:    #64748b;
    --text:     #e2e8f0;
    --text2:    #94a3b8;
    --radius:   14px;
    --radius-sm:8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; overscroll-behavior: none; }

  /* ---- TOP BAR ---- */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px env(safe-area-inset-bottom, 0);
    background: rgba(10,15,30,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
  }
  .topbar-logo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }
  .topbar-info { flex: 1; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
  .topbar-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--green);
    background: rgba(52,211,153,0.1);
    border: 0.5px solid rgba(52,211,153,0.3);
    padding: 4px 9px; border-radius: 20px;
  }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.6s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .live-badge.offline { color: var(--muted); background: rgba(100,116,139,0.1); border-color: rgba(100,116,139,0.2); }
  .live-badge.offline .live-dot { background: var(--muted); animation: none; }

  /* ---- SCROLL BODY ---- */
  .body { padding: 14px 14px calc(env(safe-area-inset-bottom,0) + 14px); display: flex; flex-direction: column; gap: 12px; }

  /* ---- STATUS PILLS ---- */
  .status-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .pill {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 9px 10px;
    font-size: 11px; color: var(--text2);
  }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--muted); }
  .pill-dot.ok     { background: var(--green); }
  .pill-dot.warn   { background: var(--amber); }

  /* ---- VITAL CARDS ---- */
  .vitals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .vital-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px 14px;
    position: relative; overflow: hidden;
  }
  .vital-card.wide { grid-column: span 2; }
  .vital-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--card-accent, var(--accent));
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .vital-label { font-size: 10px; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .vital-value { font-size: 32px; font-weight: 300; color: var(--text); line-height: 1; letter-spacing: -0.02em; }
  .vital-unit  { font-size: 13px; color: var(--text2); margin-left: 3px; }
  .vital-status{ font-size: 11px; margin-top: 6px; }
  .status-ok   { color: var(--green); }
  .status-warn { color: var(--amber); }
  .status-crit { color: var(--red); }
  .no-finger   { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .mini-bar { height: 2px; border-radius: 2px; background: var(--surface2); margin-top: 10px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

  /* ---- CHART CARD ---- */
  .chart-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .legend { display: flex; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .legend-sq { width: 8px; height: 8px; border-radius: 2px; }

  /* ---- ENV ROW ---- */
  .env-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .env-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 14px;
  }

  /* ---- UPTIME ---- */
  .uptime-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .uptime-lbl { font-size: 12px; color: var(--text2); }
  .uptime-val { font-size: 14px; font-weight: 500; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }

  /* ---- CSV ---- */
  .csv-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .csv-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 10px; }
  .upload-btn {
    display: block; width: 100%; padding: 10px;
    border: 0.5px dashed rgba(110,180,255,0.25);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text2); font-size: 13px;
    text-align: center; cursor: pointer;
    transition: background 0.15s;
  }
  .upload-btn:hover { background: #1f2d45; }
  .tbl-wrap { overflow-x: auto; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 360px; }
  th { padding: 6px 8px; color: var(--text2); border-bottom: 0.5px solid var(--border); font-weight: 400; text-align: left; white-space: nowrap; }
  td { padding: 6px 8px; color: var(--text); border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .note { font-size: 11px; color: var(--muted); text-align: center; padding: 4px 0 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <img class="topbar-logo" src="logo.jpg" alt="DNF">
  <div class="topbar-info">
    <div class="topbar-title">DNF Glove</div>
    <div class="topbar-sub" id="last-updated">Connecting...</div>
  </div>
  <div class="live-badge offline" id="live-badge">
    <div class="live-dot"></div>
    <span id="live-label">Offline</span>
  </div>
</div>

<!-- SCROLL BODY -->
<div class="body">

  <!-- STATUS -->
  <div class="status-row">
    <div class="pill"><div class="pill-dot" id="dot-wifi"></div><span id="lbl-wifi">WiFi</span></div>
    <div class="pill"><div class="pill-dot" id="dot-sd"></div><span id="lbl-sd">SD Card</span></div>
    <div class="pill"><div class="pill-dot" id="dot-finger"></div><span id="lbl-finger">Finger</span></div>
  </div>

  <!-- VITALS -->
  <div class="vitals-grid">

    <!-- HR -->
    <div class="vital-card" style="--card-accent: #f87171;">
      <div class="vital-label">Heart rate</div>
      <div id="hr-val"><span class="no-finger">No finger</span></div>
      <div id="hr-status" class="vital-status"></div>
      <div class="mini-bar"><div class="mini-bar-fill" id="hr-bar" style="width:0%;background:#f87171;"></div></div>
    </div>

    <!-- SPO2 -->
    <div class="vital-card" style="--card-accent: #60a5fa;">
      <div class="vital-label">SpO2</div>
      <div id="spo2-val"><span class="no-finger">No finger</span></div>
      <div id="spo2-status" class="vital-status"></div>
      <div class="mini-bar"><div class="mini-bar-fill" id="spo2-bar" style="width:0%;background:#60a5fa;"></div></div>
    </div>

    <!-- BODY TEMP -->
    <div class="vital-card wide" style="--card-accent: #34d399;">
      <div class="vital-label">Body temperature</div>
      <div id="bt-val"><span style="font-size:22px;font-weight:300;color:var(--muted)">--</span></div>
      <div id="bt-status" class="vital-status"></div>
    </div>

  </div>

  <!-- TREND CHART -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">Vitals trend</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-sq" style="background:#f87171"></div>HR</div>
        <div class="legend-item"><div class="legend-sq" style="background:#60a5fa"></div>SpO2</div>
      </div>
    </div>
    <div style="position:relative;height:150px;">
      <canvas id="chart" role="img" aria-label="Line chart showing heart rate and SpO2 over time">Live vitals trend.</canvas>
    </div>
  </div>

  <!-- ENV -->
  <div class="env-row">
    <div class="env-card">
      <div class="vital-label">Humidity</div>
      <div><span class="vital-value" id="hum-val" style="font-size:24px">--</span><span class="vital-unit">%</span></div>
    </div>
    <div class="env-card">
      <div class="vital-label">Room temp</div>
      <div><span class="vital-value" id="room-val" style="font-size:24px">--</span><span class="vital-unit">°C</span></div>
    </div>
  </div>

  <!-- UPTIME -->
  <div class="uptime-card">
    <span class="uptime-lbl">Session uptime</span>
    <span class="uptime-val" id="uptime-val">--:--:--</span>
  </div>

  <!-- CSV -->
  <div class="csv-card">
    <div class="csv-title">Historical data — SD card</div>
    <label class="upload-btn">
      Upload data.csv from SD card
      <input type="file" accept=".csv" id="csvInput" style="display:none">
    </label>
    <div class="tbl-wrap" id="tbl-wrap"></div>
  </div>

  <div class="note" id="poll-note">Polling Firebase every 5 s</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DB = "https://wearable-iot-medical-glove-default-rtdb.asia-southeast1.firebasedatabase.app/sensors.json";
const MAX_PTS = 20;
const hrHist = [], spo2Hist = [], lbls = [];
let chart = null;

/* ---- Chart ---- */
function buildChart() {
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: lbls,
      datasets: [
        { label:'HR', data: hrHist, borderColor:'#f87171', backgroundColor:'rgba(248,113,113,0.06)',
          borderWidth:1.5, pointRadius:2, tension:0.4, fill:true, yAxisID:'yHR' },
        { label:'SpO2', data: spo2Hist, borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,0.06)',
          borderWidth:1.5, pointRadius:2, tension:0.4, fill:true, yAxisID:'ySPO2' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 400 },
      plugins: {
        legend: { display: false },
        tooltip: { bodyFont:{size:11}, titleFont:{size:11},
          callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y }
        }
      },
      scales: {
        x: { ticks:{ color:'#64748b', font:{size:10}, maxRotation:0, autoSkip:true, maxTicksLimit:5 }, grid:{ color:'rgba(255,255,255,0.04)' } },
        yHR:   { position:'left',  min:40,  max:180, ticks:{ color:'#f87171', font:{size:10}, stepSize:40 }, grid:{ color:'rgba(255,255,255,0.04)' }, title:{ display:true, text:'bpm', color:'#64748b', font:{size:10} } },
        ySPO2: { position:'right', min:85,  max:100, ticks:{ color:'#60a5fa', font:{size:10}, stepSize:5  }, grid:{ display:false }, title:{ display:true, text:'%', color:'#64748b', font:{size:10} } }
      }
    }
  });
}

/* ---- Helpers ---- */
function ts() {
  const d = new Date();
  return [d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
}
function setDot(id, state) {
  document.getElementById(id).className = 'pill-dot' + (state==='ok'?' ok':state==='warn'?' warn':'');
}
function hrLabel(hr) {
  if (hr < 50)  return ['Bradycardia','status-warn'];
  if (hr <= 100) return ['Normal','status-ok'];
  if (hr <= 120) return ['Elevated','status-warn'];
  return ['Tachycardia','status-crit'];
}
function spo2Label(s) {
  if (s >= 95) return ['Normal','status-ok'];
  if (s >= 90) return ['Low','status-warn'];
  return ['Critical','status-crit'];
}
function btLabel(t) {
  if (t < 35.0) return ['Hypothermia','status-warn'];
  if (t <= 37.5) return ['Normal','status-ok'];
  if (t <= 38.5) return ['Low fever','status-warn'];
  return ['Fever','status-crit'];
}

/* ---- Render ---- */
function render(d) {
  const hr   = d['1_hr']   || 0;
  const spo2 = d['2_spo2'] || 0;
  const bt   = d['3_bodyTemp'];
  const hum  = d['4_humidity'];
  const room = d['5_roomTemp'];
  const up   = d['6_uptime'] || '--:--:--';

  document.getElementById('last-updated').textContent = 'Updated ' + ts();

  const badge = document.getElementById('live-badge');
  badge.className = 'live-badge';
  document.getElementById('live-label').textContent = 'Live';

  setDot('dot-wifi', 'ok'); document.getElementById('lbl-wifi').textContent = 'WiFi';
  setDot('dot-sd', 'ok');   document.getElementById('lbl-sd').textContent = 'SD Card';

  const finger = hr > 0 || spo2 > 0;
  setDot('dot-finger', finger ? 'ok' : '');
  document.getElementById('lbl-finger').textContent = finger ? 'Finger' : 'No finger';

  /* HR */
  if (finger && hr > 0) {
    document.getElementById('hr-val').innerHTML =
      '<span class="vital-value">' + hr + '</span><span class="vital-unit">bpm</span>';
    const [lbl, cls] = hrLabel(hr);
    document.getElementById('hr-status').innerHTML = '<span class="' + cls + '">' + lbl + '</span>';
    document.getElementById('hr-bar').style.width = Math.min(100,((hr-40)/140)*100) + '%';
  } else {
    document.getElementById('hr-val').innerHTML = '<span class="no-finger">No finger</span>';
    document.getElementById('hr-status').innerHTML = '';
    document.getElementById('hr-bar').style.width = '0%';
  }

  /* SpO2 */
  if (finger && spo2 > 0) {
    document.getElementById('spo2-val').innerHTML =
      '<span class="vital-value">' + spo2 + '</span><span class="vital-unit">%</span>';
    const [lbl, cls] = spo2Label(spo2);
    document.getElementById('spo2-status').innerHTML = '<span class="' + cls + '">' + lbl + '</span>';
    document.getElementById('spo2-bar').style.width = Math.min(100,((spo2-85)/15)*100) + '%';
  } else {
    document.getElementById('spo2-val').innerHTML = '<span class="no-finger">No finger</span>';
    document.getElementById('spo2-status').innerHTML = '';
    document.getElementById('spo2-bar').style.width = '0%';
  }

  /* Body Temp */
  if (bt && bt !== '--' && !isNaN(parseFloat(bt))) {
    const btv = parseFloat(bt).toFixed(1);
    document.getElementById('bt-val').innerHTML =
      '<span class="vital-value" style="font-size:24px">' + btv + '</span><span class="vital-unit">°C</span>';
    const [lbl, cls] = btLabel(parseFloat(btv));
    document.getElementById('bt-status').innerHTML = '<span class="' + cls + '">' + lbl + '</span>';
  } else {
    document.getElementById('bt-val').innerHTML = '<span style="font-size:22px;font-weight:300;color:var(--muted)">--</span>';
    document.getElementById('bt-status').innerHTML = '';
  }

  /* Env */
  document.getElementById('hum-val').textContent  = hum  ? parseFloat(hum).toFixed(1)  : '--';
  document.getElementById('room-val').textContent = room ? parseFloat(room).toFixed(1) : '--';
  document.getElementById('uptime-val').textContent = up;

  /* Chart */
  if (finger) {
    lbls.push(ts());
    hrHist.push(hr > 0 ? hr : null);
    spo2Hist.push(spo2 > 0 ? spo2 : null);
    if (lbls.length > MAX_PTS) { lbls.shift(); hrHist.shift(); spo2Hist.shift(); }
    chart && chart.update('none');
  }
}

/* ---- Fetch ---- */
function fetchData() {
  fetch(DB)
    .then(r => r.json())
    .then(d => { if (d) render(d); })
    .catch(() => {
      document.getElementById('live-badge').className = 'live-badge offline';
      document.getElementById('live-label').textContent = 'Offline';
      document.getElementById('last-updated').textContent = 'Connection lost';
      document.getElementById('poll-note').textContent = 'Retrying...';
    });
}

/* ---- CSV ---- */
document.getElementById('csvInput').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const lines = ev.target.result.trim().split('\n').filter(l => l.trim());
    const show = lines.slice(-20).reverse();
    let html = '<table><thead><tr><th>HR</th><th>SpO2</th><th>Body°C</th><th>Hum%</th><th>Room°C</th><th>Uptime</th></tr></thead><tbody>';
    show.forEach(line => {
      const c = line.split(',');
      const cols = [...c, ...Array(6).fill('--')].slice(0,6);
      html += '<tr>' + cols.map(v => '<td>' + (v.trim()||'--') + '</td>').join('') + '</tr>';
    });
    html += '</tbody></table>';
    html += '<div style="font-size:11px;color:var(--muted);margin-top:8px">Last ' + show.length + ' entries</div>';
    document.getElementById('tbl-wrap').innerHTML = html;
  };
  reader.readAsText(file);
});

/* ---- Service Worker ---- */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

buildChart();
fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
